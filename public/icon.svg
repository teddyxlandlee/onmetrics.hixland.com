<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 平滑渐变：深蓝 → 中国红 -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a237e" />
      <stop offset="100%" stop-color="#b71c1c" />
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="256" cy="256" r="230" fill="url(#grad)" />

  <!-- ====== 刻度尺（上下各一条） ====== -->
  <g stroke="white" stroke-width="6" stroke-linecap="round">
    <!-- 上方刻度尺 -->
    <line x1="160" y1="140" x2="352" y2="140" />
    <line x1="160" y1="140" x2="160" y2="120" />
    <line x1="208" y1="140" x2="208" y2="120" />
    <line x1="256" y1="140" x2="256" y2="120" />
    <line x1="304" y1="140" x2="304" y2="120" />
    <line x1="352" y1="140" x2="352" y2="120" />

    <!-- 下方刻度尺 -->
    <line x1="160" y1="372" x2="352" y2="372" />
    <line x1="160" y1="372" x2="160" y2="392" />
    <line x1="208" y1="372" x2="208" y2="392" />
    <line x1="256" y1="372" x2="256" y2="392" />
    <line x1="304" y1="372" x2="304" y2="392" />
    <line x1="352" y1="372" x2="352" y2="392" />
  </g>

  <!-- ====== 垂直双向箭头（左右边界对齐） ====== -->
  <!-- 上方：向右箭头（→） -->
  <g fill="white">
    <line x1="170" y1="200" x2="280" y2="200" stroke="white" stroke-width="20" stroke-linecap="round" />
    <polygon points="280,170 342,200 280,230" />
  </g>

  <!-- 下方：向左箭头（←） -->
  <g fill="white">
    <line x1="222" y1="310" x2="342" y2="310" stroke="white" stroke-width="20" stroke-linecap="round" />
    <polygon points="222,280 170,310 222,340" />
  </g>
</svg>